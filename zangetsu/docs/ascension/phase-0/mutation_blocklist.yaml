# Zangetsu — Mutation Blocklist
# Program: Zangetsu Engine Ascension v1
# Phase:   0
# Version: 1
# Date:    2026-04-23
# Source:  state_of_truth.md + mutation_surface_map.md + charter §17 + Ascension §4
#
# Semantics:
#   - `forbidden`:    agent MUST refuse the action and escalate
#   - `requires`:     agent may proceed ONLY if the listed gate(s) are all satisfied
#   - `allowed`:      free action (still subject to Q1 hygiene)
#
# Version history is kept at the bottom of this file.

version: 1

forbidden:
  - id: BL-F-001
    rule: "Silent production mutation of any shared DB table / file / service state"
    trigger_examples:
      - "Direct SQL UPDATE/INSERT/DELETE on champion_pipeline_fresh without ADR"
      - "File rewrite under /home/j13/j13-ops/zangetsu/config/ without ADR"
      - "Restart of services/arena*.py without pre-commit state-of-truth capture"
    enforcement: "Claude Lead refuses + writes docs/decisions/YYYYMMDD-refused-*.md"

  - id: BL-F-002
    rule: "Threshold or gate change outside services/ or config/ without ADR + before/after evidence"
    trigger_examples:
      - "Changing ENTRY_THR / EXIT_THR / TRAIN_SPLIT_RATIO via env override alone"
      - "Hardcoding a new DROP_ALPHA or MIN_TRADES constant in orchestrator"
    enforcement: "Commit body must contain before_metrics / after_metrics section"

  - id: BL-F-003
    rule: "Direct INSERT/UPDATE into champion_pipeline_fresh bypassing admission_validator"
    trigger_examples:
      - "SQL INSERT INTO champion_pipeline_fresh (...) VALUES (...)"
      - "Any path that UPDATEs fresh.status from non-terminal to any state without going through admission_validator($staging_id) or release_champion()"
    enforcement: "v0.7.1 governance rule #5 via verify_no_archive_reads.sh + code review"

  - id: BL-F-004
    rule: "SELECT/FROM on bare champion_pipeline outside whitelisted files"
    whitelist:
      - "scripts/seed_101_alphas.py"
      - "scripts/seed_101_alphas_batch2.py"
      - "scripts/factor_zoo.py"
      - "services/alpha_discovery.py"
      - "scripts/rescan_legacy_with_new_gates.py"
      - "scripts/verify_no_archive_reads.sh"
    enforcement: "verify_no_archive_reads.sh invoked in zangetsu_ctl.sh start"

  - id: BL-F-005
    rule: "feat(zangetsu/vN) commit while Calcifer deploy block is RED"
    trigger_condition: "/tmp/calcifer_deploy_block.json.status == 'RED'"
    enforcement: "pre-receive hook regex-matches ^feat\\([^)]+/v"
    reference: "CLAUDE.md §17.3"

  - id: BL-F-006
    rule: "feat(zangetsu/vN) commit authored by any path other than bin/bump_version.py"
    enforcement: "pre-commit hook + git trailer check"
    reference: "CLAUDE.md §17.5"

  - id: BL-F-007
    rule: "Destructive git operation without explicit j13 authorization"
    patterns:
      - "git reset --hard"
      - "git push --force"
      - "git clean -f"
      - "git branch -D"
    scope: "main branch on origin, or any branch j13 did not authorize"
    enforcement: "pre-bash hook pattern + manual review"

  - id: BL-F-008
    rule: "Service restart without §17.6 stale-service check"
    trigger: "zangetsu_ctl.sh restart (or equivalent pkill + respawn)"
    enforcement: "hook ~/.claude/hooks/pre-done-stale-check.sh"

  - id: BL-F-009
    rule: "Destructive @macmini13bot action without 2-step /confirm flow"
    enforcement: "bot _confirm_tokens TTL + miniapp require_owner_fresh"

  - id: BL-F-010
    rule: "Commit that drops tests/ without passing replacement + ADR"
    enforcement: "CI + code review"

  - id: BL-F-011
    rule: "Add black-box module without wrapper contract"
    contract_required:
      - "input_schema"
      - "output_schema"
      - "config_schema"
      - "state_schema"
      - "metrics"
      - "error_surface"
      - "rollback_surface"
      - "version_identity"
    reference: "Ascension §3.6"

  - id: BL-F-012
    rule: "Efficiency optimization changing scientific semantics without explicit disclosure"
    trigger_examples:
      - "Caching a computed value that becomes stale across a regime boundary"
      - "Vectorizing a loop that changes NaN / inf handling silently"
    enforcement: "Q1 5-dim audit must include 'semantic equivalence' evidence"

  - id: BL-F-013
    rule: "Performance claim without evidence file"
    trigger_examples:
      - "Commit message says 'now 2× faster' without benchmark output path"
    enforcement: "Markl + Gemini co-review requires benchmark artifact"

  - id: BL-F-014
    rule: "Hidden agent disagreement"
    enforcement: "docs/decisions/YYYYMMDD-disagreement-*.md required before closure"

  - id: BL-F-015
    rule: "Modularization that hides scientific drift rather than revealing it"
    enforcement: "Phase 4 gate + Gemini adversarial"

requires:
  - id: BL-R-001
    action: "feat(zangetsu/vX.X) version bump"
    gates:
      - "Calcifer GREEN"
      - "bin/bump_version.py success (deployable_count > previous check)"
      - "Matching ADR docs/decisions/YYYYMMDD-*.md"
      - "Smoke test tests/test_v{N}_smoke.py green"
      - "Independent AKASHA witness (§17.2)"

  - id: BL-R-002
    action: "Edit services/*.py in production"
    gates:
      - "Isolated branch or worktree"
      - "ff-merge to main"
      - "§17.6 stale-check post-restart"
      - "ADR linked in commit body"

  - id: BL-R-003
    action: "Schema migration (SQL)"
    gates:
      - "Paired rollback SQL in same step directory"
      - "Idempotent DDL"
      - "State-of-truth re-capture before next phase"

  - id: BL-R-004
    action: "Manual seed / reseed"
    gates:
      - "admission_validator called for each row"
      - "Legacy path requires --i-know-deprecated-v071"

  - id: BL-R-005
    action: "Reaping stuck rows"
    gates:
      - "First invocation must be --dry-run"
      - "Age filter >= 30 min default"

  - id: BL-R-006
    action: "Update champion_pipeline_fresh.status"
    gates:
      - "Via release_champion() OR explicit --reenqueue review"
      - "ADR if bulk update"

  - id: BL-R-007
    action: "Restart workers"
    gates:
      - "§17.6 stale-check PASS on all restarted services"
      - "No concurrent discovery batch runs"

  - id: BL-R-008
    action: "Write /tmp/calcifer_deploy_block.json"
    gates:
      - "Authored by Calcifer daemon only"
      - "Manual override only via /unblock telegram command from MINIAPP_OWNER_TG_ID"

  - id: BL-R-009
    action: "Publish to Telegram"
    gates:
      - "Via calcifer/notifier.py::notify_telegram() OR documented alert hook"
      - "Severity in {critical, warning, high, medium}"

  - id: BL-R-010
    action: "Destructive miniapp shortcut"
    gates:
      - "require_owner_fresh (1h auth)"
      - "2-step confirm_token flow"
      - "owner whitelist match (MINIAPP_OWNER_TG_ID)"
      - "CONFIRM_TOKEN_TTL_S enforced"

  - id: BL-R-011
    action: "POST to AKASHA /memory for version-bump witness"
    gates:
      - "Authored by independent agent (§17.2)"
      - "deployable_count delta verified"

allowed:
  - id: BL-A-001
    action: "Read-only SELECT on any DB table (including archive)"
  - id: BL-A-002
    action: "Read parquet / JSONL / markdown / config files under repo"
  - id: BL-A-003
    action: "Run gemini / codex / markl / calcifer CLIs for analysis"
  - id: BL-A-004
    action: "Write to .claude/scratch/, docs/, logs/ directories"
  - id: BL-A-005
    action: "Shadow worktree creation under /tmp/ (LFS-aware)"
  - id: BL-A-006
    action: "Create new markdown / yaml under docs/ascension/"
  - id: BL-A-007
    action: "pytest on test-only paths with no DB writes"
  - id: BL-A-008
    action: "Read engine.jsonl / zangetsu_live.json / calcifer.log"
  - id: BL-A-009
    action: "Probe scripts running read-only on parquet data"
  - id: BL-A-010
    action: "Update this blocklist via ADR + Claude Lead approval"

version_history:
  - version: 1
    date: "2026-04-23"
    author: "Claude Lead"
    phase: "Ascension Phase 0"
    notes: "Initial blocklist derived from charter §17 + Ascension §4 + Explore mutation surface survey (48 surfaces catalogued)."
