<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<title>ZNGT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a14;--card:#0f0f1e;--border:#1a1a2e;--text:#e0e0f0;--dim:#6a6a8a;
  --cyan:#00fff0;--green:#00ff88;--pink:#ff0080;--amber:#ffaa00;
  --mono:ui-monospace,'JetBrains Mono',Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.3;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
body{padding-top:36px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.dim{color:var(--dim)}
.title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}

/* header 36px fixed */
.hdr{position:fixed;top:0;left:0;right:0;height:36px;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;font-size:11px}
.hdr .logo{font-family:var(--mono);font-weight:700;letter-spacing:1px;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:breathe 2s ease-in-out infinite}
.dot.fail{background:var(--pink);box-shadow:0 0 8px var(--pink);animation:none}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
.hdr .tp{color:var(--dim);font-family:var(--mono)}
.hdr .mode{margin-left:auto;font-family:var(--mono);font-size:10px;padding:2px 7px;border:1px solid var(--cyan);color:var(--cyan);border-radius:10px;letter-spacing:.5px}
.hdr .rfr{color:var(--dim);font-family:var(--mono);font-size:10px;min-width:42px;text-align:right}
.pull{position:fixed;top:36px;left:0;right:0;height:3px;background:var(--cyan);transform:scaleX(0);transform-origin:left;transition:transform .15s;z-index:200}

/* alerts banner */
.alert{display:none;height:44px;background:var(--pink);color:#fff;align-items:center;padding:0 14px;font-size:12px;font-weight:600;letter-spacing:.3px;gap:10px}
.alert.on{display:flex}
.alert .x{margin-left:auto;opacity:.8;font-family:var(--mono)}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:6px 8px;padding:12px 14px;overflow:hidden}
.card .ex{max-height:0;overflow:hidden;transition:max-height .3s ease-out;font-size:12px;color:var(--dim)}
.card.open .ex{max-height:260px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* card 1 headline 132px */
.hero{height:132px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero .n{font-family:var(--mono);font-size:56px;font-weight:700;line-height:1;letter-spacing:-1px;color:var(--cyan);text-shadow:0 0 12px currentColor}
.hero .n.crit{color:var(--pink)}
.hero .n.warn{color:var(--amber);text-shadow:0 0 10px currentColor}
.hero .lbl{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--dim);margin-top:4px;text-transform:uppercase}
.hero .sub{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:6px}
.hero .sub.crit{color:var(--pink)}.hero .sub.ok{color:var(--green)}.hero .sub.warn{color:var(--amber)}
.hero .age{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--mono)}

/* card 2 funnel 120px */
.funnel{height:120px;display:flex;flex-direction:column;gap:8px}
.fn-bars{flex:1;display:flex;gap:3px;align-items:stretch;margin-top:6px}
.fn-seg{position:relative;background:var(--border);border-radius:4px;min-width:14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:4px 2px;font-family:var(--mono);font-size:10px}
.fn-seg .v{font-size:11px;font-weight:700;color:var(--text)}
.fn-seg .k{font-size:9px;color:var(--dim);margin-top:1px;letter-spacing:.5px}
.fn-seg.ok{background:linear-gradient(180deg,var(--cyan),var(--green))}
.fn-seg.ok .v,.fn-seg.ok .k{color:#0a0a14}
.fn-seg.crit{background:var(--pink);box-shadow:0 0 8px rgba(255,0,128,.5)}
.fn-seg.crit .v,.fn-seg.crit .k{color:#fff}
.fn-pct{display:flex;gap:3px;font-family:var(--mono);font-size:9px;color:var(--dim)}
.fn-pct span{flex:1;text-align:center;min-width:14px}
.fn-pct span.crit{color:var(--pink);font-weight:700}

/* card 3 arena strip 72px */
.strip{height:72px;display:flex;align-items:center;justify-content:space-around;padding:0 4px}
.arn{display:flex;flex-direction:column;align-items:center;gap:4px}
.arn .d{width:10px;height:10px;border-radius:50%;background:var(--dim)}
.arn .d.act{background:var(--green)}
.arn .d.stale{background:var(--amber)}
.arn .l{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.5px}

/* card 4 a13 132px */
.a13{min-height:132px}
.a13 .row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px}
.a13 .pill{font-family:var(--mono);font-size:10px;padding:3px 9px;border:1px solid var(--cyan);color:var(--cyan);border-radius:10px;letter-spacing:.5px}
.a13 .meta{color:var(--dim);font-family:var(--mono);font-size:11px}
.wb{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.wb .n{width:48px;text-align:right;color:var(--dim);font-family:var(--mono);font-size:11px}
.wb .tk{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.wb .fl{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:3px;transition:width .3s}
.wb .v{width:40px;text-align:right;font-family:var(--mono);font-weight:600;font-size:11px;color:var(--text)}

/* activity feed */
.feed{margin:6px 8px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.feed .title{margin-bottom:8px}
.fr{display:flex;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.fr:last-child{border-bottom:none}
.fr .t{color:var(--dim);font-family:var(--mono);min-width:44px;font-size:11px}
.fr .a{color:var(--cyan);flex:1}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--cyan);color:var(--cyan);padding:8px 16px;border-radius:20px;font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .2s,transform .2s;z-index:300;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hdr">
  <span class="logo">ZNGT</span>
  <span class="dot" id="dot"></span>
  <span class="tp mono" id="tp">--/h</span>
  <span class="mode" id="mode">--</span>
  <span class="rfr mono" id="rfr">--</span>
</div>
<div class="pull" id="pull"></div>
<div class="alert" id="alert"><span id="alertMsg"></span><span class="x">&times;</span></div>

<div class="card" id="c1" data-id="hero">
  <div class="hero">
    <div class="n mono" id="dep">--</div>
    <div class="lbl">DEPLOYABLE</div>
    <div class="sub mono" id="gate">A4 GATE --</div>
    <div class="age mono" id="age">last --</div>
  </div>
  <div class="ex" id="c1ex"></div>
</div>

<div class="card" id="c2" data-id="funnel">
  <div class="funnel">
    <div class="title">PIPELINE FUNNEL</div>
    <div class="fn-bars" id="fnBars"></div>
    <div class="fn-pct" id="fnPct"></div>
  </div>
  <div class="ex" id="c2ex"></div>
</div>

<div class="card" id="c3" data-id="arenas">
  <div class="strip">
    <div class="title" style="position:absolute;margin:-28px 0 0 0">ARENAS</div>
  </div>
  <div class="strip" id="strip"></div>
  <div class="ex" id="c3ex"></div>
</div>

<div class="card a13" id="c4" data-id="a13">
  <div class="title" style="margin-bottom:8px">A13 GUIDANCE</div>
  <div class="row">
    <span class="pill" id="a13mode">--</span>
    <span class="meta" id="a13meta">-- / --</span>
  </div>
  <div id="wts"></div>
  <div class="ex" id="c4ex"></div>
</div>

<div class="feed">
  <div class="title">ACTIVITY</div>
  <div id="feed"></div>
</div>

<div class="toast" id="toast">copied</div>

<script>
(function(){
'use strict';
const POLL=5000,URL='/api/overview';
let lastData=null,failing=false,alertDismissed=false;

const $=id=>document.getElementById(id);
function fmtAge(s){if(s==null)return '--';if(s<60)return Math.round(s)+'s';if(s<3600)return Math.round(s/60)+'m';return(s/3600).toFixed(1)+'h';}
function now(){const d=new Date();return d.toTimeString().slice(0,5);}
function log2(x){return x>0?Math.log2(x+1):0;}

async function poll(){
  try{
    const r=await fetch(URL+'?t='+Date.now());
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    failing=false;$('dot').classList.remove('fail');
    render(d);
    lastData=d;
    $('rfr').textContent=now();
  }catch(e){
    failing=true;$('dot').classList.add('fail');
    $('rfr').textContent='ERR';
  }
}

function render(d){
  // header
  $('tp').textContent=(d.pipeline?.throughput_hr??0).toFixed(0)+'/h';
  $('mode').textContent=(d.a13?.mode||'--').toUpperCase().replace(/_/g,' ');

  // card 1 headline
  const dep=d.funnel?.deployable??0;
  const rate=d.funnel?.arena4_pass_rate??0;
  const depEl=$('dep');
  depEl.textContent=dep;
  depEl.classList.remove('crit','warn');
  const gateEl=$('gate');
  gateEl.classList.remove('crit','ok','warn');
  if(dep>=1){/* cyan default */}
  else if(rate===0){depEl.classList.add('crit');gateEl.classList.add('crit');}
  else{depEl.classList.add('warn');gateEl.classList.add('warn');}
  gateEl.textContent='A4 GATE '+(rate).toFixed(1)+'%';
  $('age').textContent='last champion '+fmtAge(d.health?.last_champion_ago_s);

  // card 2 funnel
  const f=d.funnel||{};
  const segs=[
    {k:'A1',v:f.arena1||0},
    {k:'A2/3',v:f.arena23||0},
    {k:'A4',v:(f.arena4_eliminated||0)+(f.arena4_passed||0)},
    {k:'CAND',v:f.candidate||0},
    {k:'DEP',v:f.deployable||0}
  ];
  const maxL=Math.max(...segs.map(s=>log2(s.v)),1);
  $('fnBars').innerHTML=segs.map((s,i)=>{
    const w=Math.max(log2(s.v)/maxL,0.08);
    const prev=i>0?segs[i-1].v:s.v;
    const pass=prev>0?s.v/prev:0;
    const cls=(i>0&&s.v>0&&pass<0.05)?'crit':(s.v>0?'ok':'');
    return `<div class="fn-seg ${cls}" style="flex:${w.toFixed(2)}"><span class="v">${s.v}</span><span class="k">${s.k}</span></div>`;
  }).join('');
  $('fnPct').innerHTML=segs.map((s,i)=>{
    if(i===0)return '<span>100%</span>';
    const prev=segs[i-1].v;
    const pct=prev>0?(s.v/prev*100):0;
    const cls=pct<5?'crit':'';
    return `<span class="${cls}">${pct.toFixed(0)}%</span>`;
  }).join('');

  // card 3 arenas — infer activity from last_champion_ago_s as global proxy
  const ago=d.health?.last_champion_ago_s??9999;
  const arenas=['A1','A2','A3','A4','A5','A13'];
  const counts={A1:f.arena1,A2:f.arena23,A3:f.arena23,A4:(f.arena4_eliminated||0)+(f.arena4_passed||0),A5:f.candidate,A13:d.a13?.failures};
  $('strip').innerHTML=arenas.map(a=>{
    const c=counts[a]||0;
    let cls='';
    if(c>0&&ago<300)cls='act';
    else if(c>0&&ago<1800)cls='stale';
    return `<div class="arn"><span class="d ${cls}"></span><span class="l">${a}</span></div>`;
  }).join('');

  // card 4 a13
  $('a13mode').textContent=(d.a13?.mode||'--').replace(/_/g,' ');
  $('a13meta').textContent=`survivors ${d.a13?.survivors??0} | failures ${d.a13?.failures??0}`;
  const ws=(d.a13?.top_weights||[]).slice(0,3);
  const maxW=Math.max(...ws.map(x=>x.weight),2.0);
  $('wts').innerHTML=ws.map(w=>`<div class="wb"><span class="n">${w.indicator}</span><div class="tk"><div class="fl" style="width:${(w.weight/maxW*100).toFixed(0)}%"></div></div><span class="v">${w.weight.toFixed(2)}</span></div>`).join('')||'<div class="dim" style="font-size:11px;padding:4px 0">no guidance</div>';

  // alerts
  const red=(d.alerts||[]).find(a=>a.level==='red');
  const alEl=$('alert');
  if(red&&!alertDismissed){$('alertMsg').textContent=red.msg;alEl.classList.add('on');}
  else alEl.classList.remove('on');

  // activity feed — synthesize from counters deltas if prev data; else placeholder
  const feed=[];
  feed.push({t:now(),a:`throughput ${(d.pipeline?.throughput_hr||0).toFixed(0)}/h · ${d.pipeline?.new_1h||0} new`});
  feed.push({t:fmtAge(ago),a:`last champion · A4 gate ${rate.toFixed(1)}%`});
  feed.push({t:'now',a:`A13 ${d.a13?.mode||'--'} · ${d.a13?.failures||0} failures analyzed`});
  feed.push({t:'1h',a:`${f.arena4_eliminated||0} eliminated at A4`});
  feed.push({t:'24h',a:`${f.deployable||0} deployable, ${f.candidate||0} candidate`});
  $('feed').innerHTML=feed.map(x=>`<div class="fr"><span class="t">${x.t}</span><span class="a">${x.a}</span></div>`).join('');
}

// card expand — tap to accordion + url hash
document.querySelectorAll('.card').forEach(c=>{
  c.addEventListener('click',e=>{
    if(e.target.closest('.wb, .arn'))return;
    c.classList.toggle('open');
    const id=c.dataset.id;
    history.replaceState(null,'',c.classList.contains('open')?'#'+id:location.pathname);
    const ex=c.querySelector('.ex');
    if(c.classList.contains('open')&&lastData){
      ex.innerHTML=detailFor(c.dataset.id,lastData);
    }
  });
});
if(location.hash){
  const tgt=document.querySelector(`.card[data-id="${location.hash.slice(1)}"]`);
  if(tgt)setTimeout(()=>tgt.click(),100);
}

function detailFor(id,d){
  const f=d.funnel||{};
  if(id==='hero')return `<div>deployable ${f.deployable||0} · candidate ${f.candidate||0} · active ${f.active_cards||0}</div><div style="margin-top:4px">uptime ${fmtAge(d.health?.uptime_s)}</div>`;
  if(id==='funnel')return `<div>A1 total ${f.arena1||0}</div><div>A4 passed ${f.arena4_passed||0} / eliminated ${f.arena4_eliminated||0}</div><div>rate ${(f.arena4_pass_rate||0).toFixed(2)}%</div>`;
  if(id==='arenas')return `<div>Activity inferred from last champion (${fmtAge(d.health?.last_champion_ago_s)})</div><div>green=&lt;5min · amber=&lt;30min · dim=idle</div>`;
  if(id==='a13'){
    const ws=d.a13?.top_weights||[];
    return ws.map(w=>`<div>${w.indicator} · ${w.weight.toFixed(2)}</div>`).join('')||'<div>no guidance</div>';
  }
  return '';
}

// long-press headline to copy
let pressT=null;
$('c1').addEventListener('touchstart',e=>{
  pressT=setTimeout(()=>{
    pressT=null;
    if(!lastData)return;
    const s=`ZNGT deploy=${lastData.funnel?.deployable||0} a4_gate=${(lastData.funnel?.arena4_pass_rate||0).toFixed(1)}% ${(lastData.pipeline?.throughput_hr||0).toFixed(0)}/h`;
    (navigator.clipboard?.writeText(s)||Promise.resolve()).finally(()=>{
      const t=$('toast');t.textContent='copied: '+s.slice(0,24)+'...';t.classList.add('on');
      setTimeout(()=>t.classList.remove('on'),1500);
    });
    e.preventDefault();
  },500);
},{passive:false});
$('c1').addEventListener('touchend',()=>{if(pressT){clearTimeout(pressT);pressT=null;}});
$('c1').addEventListener('touchmove',()=>{if(pressT){clearTimeout(pressT);pressT=null;}});

// dismiss alert
$('alert').addEventListener('click',()=>{alertDismissed=true;$('alert').classList.remove('on');});

// pull-to-refresh — 3px cyan bar
let y0=0,pulling=false;
document.addEventListener('touchstart',e=>{if(window.scrollY===0){y0=e.touches[0].clientY;pulling=true;}},{passive:true});
document.addEventListener('touchmove',e=>{if(!pulling)return;const dy=e.touches[0].clientY-y0;if(dy>0&&dy<150)$('pull').style.transform='scaleX('+Math.min(dy/80,1)+')';},{passive:true});
document.addEventListener('touchend',()=>{if(!pulling)return;const w=parseFloat($('pull').style.transform.replace(/[^\d.]/g,''))||0;if(w>=0.99)poll();$('pull').style.transform='scaleX(0)';pulling=false;},{passive:true});

poll();
setInterval(poll,POLL);
})();
</script>
</body>
</html>
