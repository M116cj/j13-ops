<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alaya // ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #050508;
      --bg-card:   rgba(10, 12, 22, 0.92);
      --bg-modal:  rgba(7, 9, 18, 0.97);
      --primary:   #00ffcc;
      --purple:    #b44aff;
      --orange:    #ff6b35;
      --blue:      #4a9eff;
      --dim:       #888;
      --text:      #d0d8e8;
      --border:    rgba(255,255,255,0.06);
      --font:      'JetBrains Mono', monospace;

      --glow-primary: 0 0 8px rgba(0,255,204,0.6), 0 0 24px rgba(0,255,204,0.2);
      --glow-purple:  0 0 8px rgba(180,74,255,0.6), 0 0 24px rgba(180,74,255,0.2);
      --glow-orange:  0 0 8px rgba(255,107,53,0.6), 0 0 24px rgba(255,107,53,0.2);
      --glow-blue:    0 0 8px rgba(74,158,255,0.6), 0 0 24px rgba(74,158,255,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scanline ── */
    body::before {
      content: '';
      position: fixed;
      top: -100vh;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(transparent, rgba(0,255,204,0.12), transparent);
      animation: scanline 10s linear infinite;
      pointer-events: none;
      z-index: 9999;
    }
    @keyframes scanline {
      0%   { transform: translateY(0); }
      100% { transform: translateY(200vh); }
    }

    /* ── Background grid ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,204,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5,5,8,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      gap: 16px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.1em;
      font-weight: 700;
      color: var(--primary);
      text-shadow: var(--glow-primary);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .logo span { color: rgba(0,255,204,0.4); }
    .logo-sub { font-size: 0.55em; color: rgba(0,255,204,0.35); font-weight: 400; letter-spacing: 0.08em; vertical-align: middle; margin-left: 4px; }
    .stats {
      display: flex;
      gap: 20px;
      font-size: 0.82em;
      color: var(--dim);
    }
    .stats strong { color: var(--primary); }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #clock {
      font-size: 0.78em;
      color: var(--dim);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ── Filter bar ── */
    .filters {
      position: relative;
      z-index: 1;
      padding: 14px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 5px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.78em;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active {
      background: rgba(0,255,204,0.08);
      border-color: var(--primary);
      color: var(--primary);
      text-shadow: var(--glow-primary);
    }

    /* ── Grid ── */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
      padding: 8px 32px 48px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      opacity: 0;
      transform: translateY(16px);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,204,0.3), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover::before { opacity: 1; }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,255,204,0.25);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,204,0.1), inset 0 0 24px rgba(0,255,204,0.02);
    }
    .card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23,1,0.32,1), border-color 0.25s, box-shadow 0.25s; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }
    .card-name-block { display: flex; flex-direction: column; gap: 4px; }
    .card-cat {
      font-size: 0.65em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .cat-quant   .card-cat { color: var(--primary); }
    .cat-ai      .card-cat { color: var(--purple); }
    .cat-tooling .card-cat { color: var(--orange); }

    .card-name {
      font-size: 1.25em;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      transition: text-shadow 0.25s;
    }
    .card:hover .card-name { text-shadow: 0 0 12px rgba(255,255,255,0.4); }
    .cat-quant:hover   .card-name { color: var(--primary); text-shadow: var(--glow-primary); }
    .cat-ai:hover      .card-name { color: var(--purple); text-shadow: var(--glow-purple); }
    .cat-tooling:hover .card-name { color: var(--orange); text-shadow: var(--glow-orange); }

    .card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.68em;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .badge-active       { background: rgba(0,255,204,0.12);  color: var(--primary); border: 1px solid rgba(0,255,204,0.3);  animation: pulse-green 2.5s ease-in-out infinite; }
    .badge-paper        { background: rgba(255,149,0,0.12);  color: #ff9500;        border: 1px solid rgba(255,149,0,0.3);  animation: pulse-orange 2.5s ease-in-out infinite; }
    .badge-wip          { background: rgba(74,158,255,0.12); color: var(--blue);    border: 1px solid rgba(74,158,255,0.3); }
    .badge-architecture { background: rgba(180,74,255,0.12); color: var(--purple);  border: 1px solid rgba(180,74,255,0.3); }
    .badge-done         { background: rgba(80,80,80,0.2);    color: #666;           border: 1px solid rgba(80,80,80,0.3); }

    @keyframes pulse-green  { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,204,0.3)}  50%{box-shadow:0 0 6px 2px rgba(0,255,204,0.1)} }
    @keyframes pulse-orange { 0%,100%{box-shadow:0 0 0 0 rgba(255,149,0,0.3)}  50%{box-shadow:0 0 6px 2px rgba(255,149,0,0.1)} }

    .card-desc {
      font-size: 0.85em;
      color: rgba(208,216,232,0.7);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .progress-wrap { margin-bottom: 14px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7em;
      color: var(--dim);
      margin-bottom: 5px;
    }
    .progress-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }
    .cat-quant   .progress-fill { background: linear-gradient(90deg, #00cc99, var(--primary)); }
    .cat-ai      .progress-fill { background: linear-gradient(90deg, #8833dd, var(--purple)); }
    .cat-tooling .progress-fill { background: linear-gradient(90deg, #cc4422, var(--orange)); }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7em;
      color: var(--dim);
    }
    .github-icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--dim);
      text-decoration: none;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px;
      font-size: 1em;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .github-icon-btn:hover {
      color: var(--primary);
      border-color: rgba(0,255,204,0.3);
      background: rgba(0,255,204,0.05);
    }
    .github-icon-btn svg { width: 12px; height: 12px; fill: currentColor; }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--bg-modal);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 720px;
      max-height: 86vh;
      overflow-y: auto;
      padding: 36px;
      position: relative;
      transform: scale(0.94) translateY(8px);
      transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
      scrollbar-width: thin;
      scrollbar-color: rgba(0,255,204,0.2) transparent;
    }
    #modal-overlay.open .modal-box {
      transform: scale(1) translateY(0);
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--dim);
      font-size: 1.2em;
      cursor: pointer;
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
      transition: all 0.2s;
    }
    .modal-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

    .modal-header { margin-bottom: 24px; }
    .modal-cat-label {
      font-size: 0.65em;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .modal-title {
      font-size: 2em;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .modal-title.neon-green  { color: var(--primary); text-shadow: var(--glow-primary); }
    .modal-title.neon-purple { color: var(--purple);  text-shadow: var(--glow-purple); }
    .modal-title.neon-orange { color: var(--orange);  text-shadow: var(--glow-orange); }

    .modal-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .modal-section { margin-bottom: 24px; }
    .modal-section-title {
      font-size: 0.68em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .modal-desc {
      font-size: 0.9em;
      color: rgba(208,216,232,0.8);
      line-height: 1.6;
    }

    .tag-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      font-size: 0.75em;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      border: 1px solid;
    }
    .tag-green  { background: rgba(0,255,204,0.08); color: var(--primary); border-color: rgba(0,255,204,0.25); }
    .tag-purple { background: rgba(180,74,255,0.08); color: var(--purple);  border-color: rgba(180,74,255,0.25); }
    .tag-orange { background: rgba(255,107,53,0.08); color: var(--orange);  border-color: rgba(255,107,53,0.25); }

    .modal-progress-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .modal-progress-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4,0,0.2,1) 0.1s;
    }
    .modal-progress-label { font-size: 0.75em; color: var(--dim); text-align: right; }

    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .todo-item {
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.85em;
      line-height: 1.4;
      cursor: text;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text);
      outline: none;
      word-break: break-word;
    }
    .todo-item:focus {
      border-color: rgba(0,255,204,0.3);
      background: rgba(0,255,204,0.03);
      box-shadow: 0 0 0 2px rgba(0,255,204,0.08);
    }
    .todo-item:hover { border-color: rgba(255,255,255,0.1); }

    .modal-actions {
      display: flex;
      gap: 10px;
      padding-top: 8px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      background: rgba(0,255,204,0.08);
      border: 1px solid rgba(0,255,204,0.3);
      color: var(--primary);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.82em;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .btn-primary:hover {
      background: rgba(0,255,204,0.14);
      border-color: var(--primary);
      box-shadow: var(--glow-primary);
    }
    .btn-primary svg { width: 14px; height: 14px; fill: currentColor; }

    /* scrollbar */
    .modal-box::-webkit-scrollbar { width: 4px; }
    .modal-box::-webkit-scrollbar-track { background: transparent; }
    .modal-box::-webkit-scrollbar-thumb { background: rgba(0,255,204,0.2); border-radius: 2px; }

    @media (max-width: 720px) {
      .topbar { padding: 0 16px; }
      .filters { padding: 12px 16px; }
      .grid { grid-template-columns: 1fr; padding: 8px 16px 40px; }
      .modal-box { padding: 24px 20px; }
      .modal-title { font-size: 1.5em; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">Alaya <span>//</span> ops<span class="logo-sub"> ctrl: j13</span></div>
      <div class="stats">
        <span>projects <strong id="stat-total">0</strong></span>
        <span>active <strong id="stat-active">0</strong></span>
        <span>live <strong id="stat-live">0</strong></span>
      </div>
    </div>
    <div class="topbar-right">
      <div id="clock"></div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all')">All</button>
    <button class="filter-btn"        data-filter="quant" onclick="setFilter('quant')">⚡ Quant</button>
    <button class="filter-btn"        data-filter="ai"    onclick="setFilter('ai')">◈ AI</button>
    <button class="filter-btn"        data-filter="tooling" onclick="setFilter('tooling')">⬡ Tooling</button>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-header">
        <div class="modal-cat-label" id="m-cat"></div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-meta" id="m-meta"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Description</div>
        <div class="modal-desc" id="m-desc"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Stack</div>
        <div class="tag-list" id="m-stack"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Progress</div>
        <div class="modal-progress-bar-bg">
          <div class="modal-progress-fill" id="m-progress-fill"></div>
        </div>
        <div class="modal-progress-label" id="m-progress-label"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Task Queue</div>
        <ul class="todo-list" id="m-todos"></ul>
      </div>
      <div class="modal-actions">
        <a class="btn-primary" id="m-github" href="#" target="_blank" rel="noopener">

      </div>
    </div>
  </div>

    // ── State ──
    let projects = JSON.parse(localStorage.getItem('alaya_projects_v1')) || DEFAULT_PROJECTS;
    let currentFilter = 'all';
    let openProjectId = null;

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) +
        ' ' + now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Stats ──
    function updateStats() {
      document.getElementById('stat-total').textContent  = projects.length;
      document.getElementById('stat-active').textContent = projects.filter(p => p.status === 'active').length;
      document.getElementById('stat-live').textContent   = projects.filter(p => p.status === 'paper-trading').length;
    }

    // ── Filter ──
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === f));
      renderGrid();
    }
    window.setFilter = setFilter;

    // ── Render Grid ──
    function renderGrid() {
      const grid = document.getElementById('grid');
      const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.category === currentFilter);

      grid.innerHTML = filtered.map(p => cardHTML(p)).join('');
      updateStats();

      // Stagger fade-in
      requestAnimationFrame(() => {
        document.querySelectorAll('.card').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 55);
        });
      });

      // Animate progress bars
      requestAnimationFrame(() => {
        document.querySelectorAll('.card').forEach(el => {
          const fill = el.querySelector('.progress-fill');
          if (fill) {
            setTimeout(() => {
              fill.style.width = fill.dataset.target + '%';
            }, 80);
          }
        });
      });
    }

    const statusLabel = { 'active':'Active', 'paper-trading':'Paper Trading', 'wip':'WIP', 'architecture':'Architecture', 'done':'Done' };
    const badgeClass  = { 'active':'badge-active', 'paper-trading':'badge-paper', 'wip':'badge-wip', 'architecture':'badge-architecture', 'done':'badge-done' };
    const catColor    = { 'quant':'cat-quant', 'ai':'cat-ai', 'tooling':'cat-tooling' };
    const GH_ICON = `<svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>`;

    function cardHTML(p) {
      return `
        <div class="card ${catColor[p.category]||''}" onclick="openModal('${p.id}')">
          <div class="card-top">
            <div class="card-name-block">
              <div class="card-cat">// ${p.category}</div>
              <div class="card-name">${p.name}</div>
            </div>
            <div class="card-badges">
              <span class="badge ${badgeClass[p.status]||''}">${statusLabel[p.status]||p.status}</span>
              <a class="github-icon-btn" href="https://github.com/${p.github}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                ${GH_ICON} repo
              </a>
            </div>
          </div>
          <div class="card-desc">${p.desc}</div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span>progress</span><span>${p.progress}%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-fill" data-target="${p.progress}" style="width:0%"></div>
            </div>
          </div>
          <div class="card-footer">
            <span>updated ${p.lastUpdated}</span>
            <span>${p.todos ? p.todos.length + ' tasks' : ''}</span>
          </div>
        </div>`;
    }

    // ── Modal ──
    function openModal(id) {
      const p = projects.find(x => x.id === id);
      if (!p) return;
      openProjectId = id;

      const cat = p.category;
      const neonClass = cat === 'quant' ? 'neon-green' : cat === 'ai' ? 'neon-purple' : 'neon-orange';
      const tagClass  = cat === 'quant' ? 'tag-green'  : cat === 'ai' ? 'tag-purple'  : 'tag-orange';
      const fillColor = cat === 'quant' ? 'linear-gradient(90deg,#00cc99,#00ffcc)'
                      : cat === 'ai'    ? 'linear-gradient(90deg,#8833dd,#b44aff)'
                      :                   'linear-gradient(90deg,#cc4422,#ff6b35)';

      document.getElementById('m-cat').textContent = `// ${p.category}`;
      document.getElementById('m-cat').style.color = cat === 'quant' ? 'var(--primary)' : cat === 'ai' ? 'var(--purple)' : 'var(--orange)';
      document.getElementById('m-title').textContent = p.name;
      document.getElementById('m-title').className = `modal-title ${neonClass}`;
      document.getElementById('m-meta').innerHTML =
        `<span class="badge ${badgeClass[p.status]||''}">${statusLabel[p.status]||p.status}</span>
         <span style="font-size:0.75em;color:var(--dim)">updated ${p.lastUpdated}</span>`;
      document.getElementById('m-desc').textContent = p.fullDesc || p.desc;
      document.getElementById('m-stack').innerHTML = (p.stack||[]).map(t => `<span class="tag ${tagClass}">${t}</span>`).join('');

      const fill = document.getElementById('m-progress-fill');
      fill.style.background = fillColor;
      fill.style.width = '0%';
      document.getElementById('m-progress-label').textContent = `${p.progress}%`;
      setTimeout(() => { fill.style.width = p.progress + '%'; }, 60);

      document.getElementById('m-todos').innerHTML = (p.todos||[]).map((t,i) =>
        `<li class="todo-item" contenteditable="true"
          data-pid="${p.id}" data-idx="${i}"
          onblur="saveTodo(this)">${t}</li>`
      ).join('');

      document.getElementById('m-github').href = `https://github.com/${p.github}`;

      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    window.openModal = openModal;

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
      openProjectId = null;
    }
    window.closeModal = closeModal;

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }
    window.handleOverlayClick = handleOverlayClick;

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Save todo ──
    function saveTodo(el) {
      const pid  = el.dataset.pid;
      const idx  = parseInt(el.dataset.idx);
      const text = el.textContent.trim();
      const p    = projects.find(x => x.id === pid);
      if (p) {
        p.todos[idx] = text;
        p.lastUpdated = new Date().toISOString().slice(0,10);
        localStorage.setItem('alaya_projects_v1', JSON.stringify(projects));
      }
    }
    window.saveTodo = saveTodo;

    // ── Init ──
    renderGrid();
  </script>
