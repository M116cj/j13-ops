services:
  echelon:
    build: .
    container_name: echelon
    restart: unless-stopped
    env_file: .env
    networks:
      - deploy
    healthcheck:
      test: ["CMD", "python", "-c", "import psycopg2, httpx; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  deploy:
    external: true
    name: deploy_zangetsu_net
