groups:
  - name: alaya-critical
    rules:
      - alert: NexusCoreDown
        expr: up{job="nexus-core"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "nexus-core pipeline is DOWN"

      - alert: GPUVRAMCritical
        expr: (nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GPU VRAM above 95%"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes > 400000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 400MB"

      - alert: ContainerRestarting
        expr: increase(container_restart_count[1h]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 15%"

      - alert: GatewayBotDown
        expr: bot_up{bot="gateway"} == 0
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "Gateway bot (@Alaya13jbot) is DOWN"

      - alert: LiteLLMDown
        expr: up{job="litellm"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LiteLLM proxy is DOWN — LLM calls will fail"

      - alert: NexusEngineDown
        expr: up{job="nexus-engine"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "nexus-engine (Qwen) is DOWN"
