groups:
  - name: alaya
    interval: 30s
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alaya CPU > 90% for 5m"

      - alert: HighRAM
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alaya RAM > 90%"

      - alert: DiskFull
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alaya disk / > 80%"

      - alert: ContainerDown
        expr: absent(container_last_seen{name=~"nexus-core|nexus-postgres|nexus-redis|magi-litellm-1|obs-prometheus|obs-grafana"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical container {{ $labels.name }} not seen"

      - alert: ContainerOOM
        expr: container_oom_events_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "OOM kill in container {{ $labels.name }}"
