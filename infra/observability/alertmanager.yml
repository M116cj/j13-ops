global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-alerts'
  routes:
    - match:
        severity: critical
      repeat_interval: 1h
      receiver: 'telegram-alerts'

receivers:
  - name: 'telegram-alerts'
    webhook_configs:
      - url: 'http://host.docker.internal:9087/alert'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
